---
layout: default
---
<article class="post">
  <header class="post-header">
    <h3>{{ page.title }}</h3>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.author %} &middot; {{ page.author }}{% endif %}
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
